<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slip Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    .test-shell {
      display: grid;
      gap: 24px;
    }

    .test-card,
    .result-card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .test-card h2,
    .result-card h3 {
      margin: 0 0 8px;
      color: var(--green-900);
    }

    .test-card p,
    .result-card p,
    .result-card li,
    .status-chip {
      color: var(--muted);
    }

    .test-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .test-form .field.full {
      grid-column: 1 / -1;
    }

    .test-form label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--green-900);
    }

    .test-form input,
    .test-form textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .test-form textarea {
      min-height: 140px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 13px;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: flex-start;
      margin-top: 8px;
    }

    .primary-btn,
    .ghost-btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary-btn {
      background: var(--green-800);
      color: white;
    }

    .ghost-btn {
      background: var(--green-50);
      color: var(--green-800);
      border: 1px solid var(--line);
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--green-50);
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .status-chip.success {
      color: var(--green-800);
      background: var(--green-100);
    }

    .status-chip.error {
      color: var(--danger);
      background: rgba(216, 72, 72, 0.08);
      border-color: rgba(216, 72, 72, 0.2);
    }

    .checks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .check-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: #fff;
    }

    .check-box strong {
      display: block;
      margin-bottom: 6px;
      color: var(--green-900);
    }

    .check-box.ok {
      border-color: rgba(39, 131, 95, 0.3);
      background: rgba(215, 244, 228, 0.35);
    }

    .check-box.bad {
      border-color: rgba(216, 72, 72, 0.24);
      background: rgba(216, 72, 72, 0.05);
    }

    .hint-list {
      margin: 12px 0 0;
      padding-left: 18px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 720px) {
      .test-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-page-title-suffix="ทดสอบตรวจสลิป">
  <header class="topbar">
    <a class="brand" href="customer.html">
      <img class="site-logo" src="LOGO.jpg" alt="โลโก้โฮมสเตย์" />
      <div>
        <h1>โฮมสเตย์</h1>
        <p>หน้าเทสระบบตรวจสอบสลิป</p>
      </div>
    </a>
    <nav>
      <a class="nav-link" href="customer.html">หน้าจอง</a>
      <a class="nav-link active" href="slip-test.html">Slip Test</a>
    </nav>
  </header>

  <main>
    <section class="test-shell">
      <article class="test-card">
        <span class="pill">Developer Tool</span>
        <h2>ทดสอบ `verify-slip` แบบตรง</h2>
        <p>อัปโหลดรูปสลิป กรอกยอดและเลขบัญชีที่คาดหวัง แล้วกดตรวจเพื่อดูว่าระบบ EasySlip กับ Edge Function พร้อมใช้งานหรือไม่</p>

        <form id="slipTestForm" class="test-form">
          <div class="field">
            <label for="homestaySlug">Homestay Slug</label>
            <input id="homestaySlug" type="text" required />
          </div>
          <div class="field">
            <label for="bookingCode">เลขอ้างอิงทดสอบ</label>
            <input id="bookingCode" type="text" placeholder="เช่น TEST-SLIP-001" required />
          </div>
          <div class="field">
            <label for="grandTotal">ยอดที่คาดหวัง (บาท)</label>
            <input id="grandTotal" type="number" min="0" step="0.01" placeholder="เช่น 20" required />
          </div>
          <div class="field">
            <label for="bankAccountName">ชื่อบัญชีปลายทาง</label>
            <input id="bankAccountName" type="text" placeholder="เช่น GreenStay Homestay" required />
          </div>
          <div class="field">
            <label for="bankAccountNumber">เลขบัญชีปลายทาง</label>
            <input id="bankAccountNumber" type="text" placeholder="เช่น 123-4-56789-0" required />
          </div>
          <div class="field">
            <label for="slipFile">รูปสลิป</label>
            <input id="slipFile" type="file" accept="image/*" required />
          </div>
          <div class="field full">
            <label for="notes">หมายเหตุ</label>
            <textarea id="notes" readonly>ถ้าหน้านี้ขึ้น error ทันที:
1. เช็กว่า Supabase Edge Function ชื่อ verify-slip ถูก deploy แล้ว
2. เช็ก secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, EASYSLIP_API_KEY
3. ใช้ไฟล์สลิปเป็นรูปภาพเท่านั้น ไม่ใช่ PDF</textarea>
          </div>
          <div class="field full">
            <div class="form-actions">
              <button type="submit" class="primary-btn" id="runTestBtn">เริ่มตรวจสลิป</button>
              <button type="button" class="ghost-btn" id="fillSettingsBtn">ดึงค่าบัญชีจากระบบ</button>
              <span class="status-chip" id="envStatus">กำลังตรวจ environment...</span>
            </div>
          </div>
        </form>
      </article>

      <article class="result-card hidden" id="resultCard">
        <div class="section-head" style="margin-bottom: 12px;">
          <div>
            <h3>ผลการทดสอบ</h3>
            <p id="resultMessage">-</p>
          </div>
        </div>
        <span class="status-chip" id="resultStatus">รอผลตรวจ</span>
        <div class="checks-grid" id="checksGrid"></div>
        <div class="field full" style="margin-top: 18px;">
          <label for="rawResponse">Raw Response</label>
          <textarea id="rawResponse" readonly></textarea>
        </div>
      </article>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="app-config.js"></script>
  <script src="api.js"></script>
  <script src="slip-test.js"></script>
</body>
</html>
